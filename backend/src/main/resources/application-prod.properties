# Production Configuration
# This file is used when SPRING_PROFILES_ACTIVE=prod

# Server Configuration
server.port=${PORT:8080}

# PostgreSQL Configuration (for production)
# Railway/Render will provide DATABASE_URL automatically
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:forecastdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable H2 Console in production
spring.h2.console.enabled=false

# Initialize database
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.forecast=INFO

# Production optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

