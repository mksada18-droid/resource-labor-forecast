services:
  # Backend Service
  - type: web
    name: resource-forecast-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: mvn clean install -DskipTests
    startCommand: java -jar target/resource-labor-forecast-1.0.0.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
    healthCheckPath: /api/resources

